<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>RSPP.APP Mobile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
:root {
  --bg: #0d0d0d;
  --bg2: #141414;
  --bg3: #1c1c1c;
  --border: #2a2a2a;
  --text: #e8e8e8;
  --text2: #888;
  --accent: #e8c547;
  --danger: #d94f4f;
  --warn: #e8a030;
  --ok: #4caf6e;
  --mono: ui-monospace, SF Mono, Consolas;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
header {
  padding: 12px 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 16px;
  color: var(--accent);
  letter-spacing: 2px;
}

/* CONTENT */
#content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

/* TABS BOTTOM */
#tabs {
  height: 60px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
}

.tab-btn {
  flex: 1;
  text-align: center;
  padding-top: 8px;
  font-size: 11px;
  color: var(--text2);
  font-family: var(--mono);
}
.tab-btn.active {
  color: var(--accent);
}

/* CARDS */
.card {
  background: var(--bg2);
  padding: 14px;
  border-radius: 6px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
}
.card-title {
  font-family: var(--mono);
  font-size: 13px;
  margin-bottom: 6px;
  color: var(--accent);
}

/* BADGES */
.badge {
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 11px;
  font-family: var(--mono);
}
.badge-ok { background: #1a3d26; color: var(--ok); }
.badge-warn { background: #3d2a0a; color: var(--warn); }
.badge-danger { background: #3d1212; color: var(--danger); }

/* MODAL FULLSCREEN */
.modal {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: none;
  flex-direction: column;
  z-index: 100;
}
.modal.active { display: flex; }

.modal-header {
  padding: 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
  color: var(--accent);
  display: flex;
  justify-content: space-between;
}
.modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
.modal-footer {
  padding: 16px;
  border-top: 1px solid var(--border);
}

/* FORM */
input, textarea {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px;
  border-radius: 4px;
  margin-bottom: 12px;
  font-size: 15px;
}
textarea { min-height: 80px; }

/* BUTTON */
.btn {
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 14px;
  text-align: center;
  border: none;
}
.btn-primary { background: var(--accent); color: #000; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-ghost { background: none; border: 1px solid var(--border); color: var(--text2); }

</style>
</head>

<body>

<header>RSPP.APP</header>

<div id="content"></div>

<!-- TABS -->
<div id="tabs">
  <div class="tab-btn active" data-tab="processi">Processi</div>
  <div class="tab-btn" data-tab="procedure">Procedure</div>
  <div class="tab-btn" data-tab="rischi">Rischi</div>
  <div class="tab-btn" data-tab="nc">NC</div>
  <div class="tab-btn" data-tab="scadenze">Scadenze</div>
  <div class="tab-btn" data-tab="formazione">Formazione</div>
</div>

<script>
/* -------------------------
   DATI DI ESEMPIO
--------------------------*/
const state = {
  processi: [
    { id:1, nome:"Pesatura materie prime", reparto:"Miscelazione", proc:"Gestione solventi", rischio:"Xilene" },
    { id:2, nome:"Miscelazione", reparto:"Miscelazione", proc:"Uso miscelatore", rischio:"Rumore" },
    { id:3, nome:"Confezionamento", reparto:"Confezionamento", proc:"Linea automatica", rischio:"Schiacciamento" }
  ],
  procedure: [
    { id:1, titolo:"Gestione solventi", reparto:"Miscelazione", rischio:"Chimico" },
    { id:2, titolo:"Uso miscelatore", reparto:"Miscelazione", rischio:"Rumore" }
  ],
  rischi: [
    { id:1, agente:"Xilene", livello:"alto", reparto:"Miscelazione" },
    { id:2, agente:"Rumore", livello:"medio", reparto:"Miscelazione" }
  ],
  nc: [
    { id:1, reparto:"Miscelazione", tipo:"DPI non utilizzati", desc:"Operatore senza occhiali", stato:"aperta" }
  ],
  scadenze: [
    { id:1, titolo:"Verifica impianto terra", data:"2025-04-10" }
  ],
  formazione: [
    { id:1, nome:"Mario Rossi", modulo:"Rischio chimico", scad:"2026-01-10" }
  ]
};

/* -------------------------
   RENDER FUNZIONI
--------------------------*/
function renderProcessi() {
  return state.processi.map(p => `
    <div class="card">
      <div class="card-title">${p.nome}</div>
      <div>Reparto: ${p.reparto}</div>
      <div>Procedura: <b>${p.proc}</b></div>
      <div>Rischio: <b>${p.rischio}</b></div>
    </div>
  `).join("");
}

function renderProcedure() {
  return state.procedure.map(p => `
    <div class="card">
      <div class="card-title">${p.titolo}</div>
      <div>Reparto: ${p.reparto}</div>
      <div>Rischio: ${p.rischio}</div>
    </div>
  `).join("");
}

function renderRischi() {
  return state.rischi.map(r => `
    <div class="card">
      <div class="card-title">${r.agente}</div>
      <div>Reparto: ${r.reparto}</div>
      <div>Livello: <span class="badge badge-${r.livello === "alto" ? "danger" : r.livello === "medio" ? "warn" : "ok"}">${r.livello}</span></div>
    </div>
  `).join("");
}

function renderNC() {
  return state.nc.map(n => `
    <div class="card">
      <div class="card-title">${n.tipo}</div>
      <div>${n.desc}</div>
      <div class="badge badge-danger">${n.stato}</div>
    </div>
  `).join("");
}

function renderScadenze() {
  return state.scadenze.map(s => `
    <div class="card">
      <div class="card-title">${s.titolo}</div>
      <div>Data: ${s.data}</div>
    </div>
  `).join("");
}

function renderFormazione() {
  return state.formazione.map(f => `
    <div class="card">
      <div class="card-title">${f.nome}</div>
      <div>Modulo: ${f.modulo}</div>
      <div>Scadenza: ${f.scad}</div>
    </div>
  `).join("");
}

/* -------------------------
   NAVIGAZIONE
--------------------------*/
function showTab(tab) {
  const content = document.getElementById("content");

  if (tab === "processi") content.innerHTML = renderProcessi();
  if (tab === "procedure") content.innerHTML = renderProcedure();
  if (tab === "rischi") content.innerHTML = renderRischi();
  if (tab === "nc") content.innerHTML = renderNC();
  if (tab === "scadenze") content.innerHTML = renderScadenze();
  if (tab === "formazione") content.innerHTML = renderFormazione();
}

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    showTab(btn.dataset.tab);
  });
});

/* INIT */
showTab("processi");
</script>

</body>
</html>
